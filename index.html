<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOMAINU.ボタン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
    }

    h1 {
      font-size: 2.1rem;        /* タイトルを少し小さめに */
      color: #dcdcdc;           /* ピンク寄りの明るい色 */
    }

    .tab {
      font-size: 1.05rem;
      padding: 10px 24px;
    }

    .sound-button {
      font-size: 0.7rem;        /* ボタンの文字を少し小さく */
      padding: 0.1rem 0.5rem;
      background-color: #1e2937;
      color: #e2e8f0;           /* 白寄り */
      border: 2px solid #475569;
    }

    .sound-button:hover {
      background-color: #ec4899;
      border-color: #f472b6;
      color: white;
      transform: translateY(-2px);
    }

    .sound-button span {
      color: #94a3b8;           /* グレー（再生の文字） */
      font-size: 0.7rem;
    }
  </style>
</head>
<body class="min-h-screen py-8">
  <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-center mb-10 font-bold">KOMAINU.ボタン</h1>

    <!-- カテゴリタブ -->
    <div class="flex flex-wrap gap-3 justify-center mb-10">
      <button class="tab bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-full transition">挨拶</button>
      <button class="tab bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-full transition">笑い</button>
      <button class="tab bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-full transition">叫び</button>
    </div>

    <!-- ボタングリッド -->
    <div class="grid grid-cols-3 md:grid-cols-6 gap-2">
      <button class="sound-button rounded-2xl text-center">
        おはよう
      </button>
      <button class="sound-button rounded-2xl text-center">
        こんばんは
      </button>
      <button class="sound-button rounded-2xl text-center">
        ヤバい！
      </button>
    </div>
  </div>
<!-- 既存の Tailwind 読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ここから新しく追加 -->
  <script>
    function playSound(file, detailText) {
      // 1. 音を鳴らす（音声ファイルが sounds フォルダにある前提）
      const audio = new Audio('sounds/' + file);
      audio.play();

      // 2. 詳細テキストを表示する
      const display = document.getElementById('detail-display');
      const textArea = document.getElementById('detail-text');
      
      if (display && textArea) {
        display.classList.remove('hidden'); // 非表示(hidden)を解除
        textArea.innerText = detailText;    // 詳細文を書き換え
      }
    }
  </script>
</body>
</html>
